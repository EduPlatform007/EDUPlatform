<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Инициализация подсветки синтаксиса
        document.querySelectorAll('pre code').forEach((el) => {
            hljs.highlightElement(el);
        });
        
        // Для инициализации переводов при загрузке страницы
        setTimeout(() => {
            const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const lang = userData.language || 'kk';
            
            // Устанавливаем значение селектора языка
            const langSelect = document.getElementById('select');
            if (langSelect) {
                langSelect.value = lang === 'kk' ? 'Қазақша' : 'Русский';
            }
            
            // Применяем переводы сразу после загрузки
            if (typeof window.applyFullTranslationHtml === 'function') {
                window.applyFullTranslationHtml(lang);
            }
            
            // Проверяем, нужно ли открыть какой-то урок
            const lessonToOpen = localStorage.getItem("openLessonAfterReload");
            if (lessonToOpen) {
                localStorage.removeItem("openLessonAfterReload");
                if (typeof window.loadLesson === 'function') {
                    window.loadLesson(parseInt(lessonToOpen));
                }
            }
        }, 300);
        
        // Обработчик изменения языка
        const langSelect = document.getElementById('select');
        if (langSelect) {
            langSelect.addEventListener('change', function() {
                const lang = this.value === 'Қазақша' ? 'kk' : 'ru';
                
                // Для сохранения текущего урока при смене языка
                const currentLessonNum = localStorage.getItem('lastOpenedLesson');
                if (currentLessonNum) {
                    localStorage.setItem("openLessonAfterReload", currentLessonNum);
                }
                
                // Сохраняем выбранный язык в localStorage
                const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
                userData.language = lang;
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Получаем тип курса
                const courseType = 'html';
                localStorage.setItem('lastOpenedCourse', courseType);
                
                // Применяем полный перевод через универсальную функцию
                if (typeof window.applyUniversalTranslations === 'function') {
                    window.applyUniversalTranslations(lang, courseType);
                } else {
                    // Резервный вариант, если универсальная функция недоступна
                    // Применяем переводы напрямую
                    if (typeof window.applyFullTranslationHtml === 'function') {
                        window.applyFullTranslationHtml(lang);
                    } else {
                        // Базовые переводы через data-lang-key
                        document.documentElement.setAttribute('lang', lang);
                        const elements = document.querySelectorAll('[data-lang-key]');
                        elements.forEach(element => {
                            const key = element.getAttribute('data-lang-key');
                            if (translations[lang] && translations[lang][key]) {
                                element.innerHTML = translations[lang][key];
                            }
                        });
                    }
                }
                
                // Показываем уведомление об изменении языка
                const message = lang === 'kk' ? 'Тіл қазақшаға ауыстырылды' : 'Язык изменен на русский';
                const notificationDiv = document.createElement('div');
                notificationDiv.className = 'language-notification';
                notificationDiv.textContent = message;
                notificationDiv.style.position = 'fixed';
                notificationDiv.style.top = '10px';
                notificationDiv.style.right = '10px';
                notificationDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
                notificationDiv.style.color = 'white';
                notificationDiv.style.padding = '10px 15px';
                notificationDiv.style.borderRadius = '4px';
                notificationDiv.style.zIndex = '9999';
                document.body.appendChild(notificationDiv);
                
                setTimeout(() => {
                    notificationDiv.style.opacity = '0';
                    notificationDiv.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        if (document.body.contains(notificationDiv)) {
                            document.body.removeChild(notificationDiv);
                        }
                    }, 500);
                }, 2000);
            });
        }
        
        // Проверяем состояние аутентификации при загрузке страницы
        firebase.auth().onAuthStateChanged(user => {
            const btnLog = document.getElementById('btn-log');
            const btnProfile = document.querySelector('.user-profile-btn');
            
            if (user) {
                // Если пользователь авторизован
                console.log('Пользователь авторизован:', user.email);
                
                // Получаем данные пользователя
                const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
                
                // Синхронизируем с Firebase, если функция доступна
                if (window.firebaseAuth && typeof window.firebaseAuth.syncData === 'function') {
                    window.firebaseAuth.syncData()
                        .then(() => {
                            // После синхронизации данных, инициализируем уроки
                            // для корректного отображения прогресса
                            if (typeof window.initLessons === 'function') {
                                console.log('Инициализация уроков через window.initLessons');
                                window.initLessons();
                            } else if (typeof initLessons === 'function') {
                                console.log('Инициализация уроков через initLessons');
                                initLessons();
                            } else {
                                console.error('Функция initLessons не найдена');
                            }
                            
                            // Проверяем, нужно ли открыть конкретный урок
                            const lessonToOpen = localStorage.getItem("openLessonAfterReload");
                            if (lessonToOpen) {
                                // Удаляем флаг
                                localStorage.removeItem("openLessonAfterReload");
                                
                                // Открываем урок
                                console.log('Открываем урок:', lessonToOpen);
                                
                                // Определяем тип курса по URL
                                let currentCourseType = 'html';
                                if (window.location.pathname.includes('python_course')) {
                                    currentCourseType = 'python';
                                } else if (window.location.pathname.includes('database_course')) {
                                    currentCourseType = 'database';
                                }
                                console.log('Тип курса при загрузке урока:', currentCourseType);
                                
                                // Сохраняем тип курса
                                localStorage.setItem('lastOpenedCourse', currentCourseType);
                                
                                if (typeof window.loadLesson === 'function') {
                                    window.loadLesson(parseInt(lessonToOpen), currentCourseType);
                                    // Вызываем событие загрузки урока
                                    if (typeof window.triggerLessonLoaded === 'function') {
                                        window.triggerLessonLoaded();
                                    }
                                } else if (typeof loadLesson === 'function') {
                                    loadLesson(parseInt(lessonToOpen), currentCourseType);
                                    // Вызываем событие загрузки урока
                                    if (typeof window.triggerLessonLoaded === 'function') {
                                        window.triggerLessonLoaded();
                                    }
                                } else {
                                    console.error('Функция loadLesson не найдена');
                                }
                            }
                        })
                        .catch(error => {
                            console.error('Ошибка при синхронизации данных:', error);
                        });
                } else {
                    // Если Firebase недоступен, просто инициализируем уроки
                    console.warn('Firebase недоступен, инициализируем уроки локально');
                    if (typeof window.initLessons === 'function') {
                        window.initLessons();
                    } else if (typeof initLessons === 'function') {
                        initLessons();
                    } else {
                        console.error('Функция initLessons не найдена');
                    }
                    
                    // Проверяем, нужно ли открыть конкретный урок
                    const lessonToOpen = localStorage.getItem("openLessonAfterReload");
                    if (lessonToOpen) {
                        // Удаляем флаг
                        localStorage.removeItem("openLessonAfterReload");
                        
                        // Открываем урок
                        if (typeof window.loadLesson === 'function') {
                            window.loadLesson(parseInt(lessonToOpen));
                            // Вызываем событие загрузки урока
                            if (typeof window.triggerLessonLoaded === 'function') {
                                window.triggerLessonLoaded();
                            }
                        } else if (typeof loadLesson === 'function') {
                            loadLesson(parseInt(lessonToOpen));
                            // Вызываем событие загрузки урока
                            if (typeof window.triggerLessonLoaded === 'function') {
                                window.triggerLessonLoaded();
                            }
                        } else {
                            console.error('Функция loadLesson не найдена');
                        }
                    }
                }
                
                // Обновляем UI
                btnLog.style.display = 'none';
                btnProfile.style.display = 'inline-block';
                
                // Устанавливаем язык из настроек пользователя
                if (userData.language) {
                    document.getElementById('select').value = userData.language === 'kk' ? 'Қазақша' : 'Русский';
                    updateLanguage(userData.language);
                }
            } else {
                // Если пользователь не авторизован, перенаправляем на страницу входа
                window.location.href = 'login.html';
            }
        });
        
        // Функция для предупреждения о заблокированных уроках
        window.showLockedWeek = function() {
            const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const lang = userData.language || 'kk';
            const message = translations[lang]['locked_week'] || 'Бұл аптаның сабақтары әлі қолжетімді емес. Алдыңғы сабақтарды аяқтағаннан кейін ашылады.';
            
            alert(message);
        };

        // Theme switcher
        const themeSwitch = document.getElementById('theme-switch');
        const themeIcon = document.getElementById('theme-icon');
        
        // Check for saved theme preference or use default
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        
        // Update icon based on current theme
        if (currentTheme === 'dark') {
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }
        
        // Theme switch event
        themeSwitch.addEventListener('click', function() {
            let theme = 'light';
            
            // If current theme is light, switch to dark
            if (document.documentElement.getAttribute('data-theme') === 'light') {
                document.documentElement.setAttribute('data-theme', 'dark');
                theme = 'dark';
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
            
            // Save preference to localStorage
            localStorage.setItem('theme', theme);
        });
    });
</script>
